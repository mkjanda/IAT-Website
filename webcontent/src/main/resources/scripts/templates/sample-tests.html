<svg-header params="caption : 'Sample Tests', template : headerTemplate, display : display"></svg-header>
<div id="sampleTests" data-bind="foreach: { data : columnTests, as : 'testColumn', noChildContext : true }">

        <sample-test params="testData : test, slideWidth : 450, display : display"></sample-test>
    </div>
</div>
